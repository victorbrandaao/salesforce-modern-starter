<template>
    <div class="bg-white rounded-lg shadow-md p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Accounts</h1>
            <button
                class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition duration-200"
                onclick="
                    {
                        handleRefresh;
                    }
                "
                disabled="{isLoading}"
            >
                <span if:false="{isLoading}">🔄 Refresh</span>
                <span if:true="{isLoading}">⏳ Loading...</span>
            </button>
        </div>

        <!-- Account Count -->
        <div class="mb-4 text-gray-600">
            <p class="text-sm">Total accounts: <strong>{accountCount}</strong></p>
        </div>

        <!-- Error Message -->
        <template if:true="{error}">
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
                <p class="font-bold">Error</p>
                <p>{error}</p>
            </div>
        </template>

        <!-- Loading State -->
        <template if:true="{isLoading}">
            <div class="text-center py-8">
                <p class="text-gray-500">Loading accounts...</p>
            </div>
        </template>

        <!-- Accounts Table -->
        <template if:true="{hasAccounts}">
            <div class="overflow-x-auto">
                <table class="min-w-full bg-gray-50 border border-gray-200 rounded">
                    <thead class="bg-gray-100 border-b">
                        <tr>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">
                                Name
                            </th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">
                                Phone
                            </th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">
                                Industry
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each="{accounts}" for:item="account">
                            <tr
                                key="{account.Id}"
                                class="border-b hover:bg-blue-50 cursor-pointer transition duration-150"
                                data-id="{account.Id}"
                                onclick="
                                    {
                                        handleRowClick;
                                    }
                                "
                            >
                                <td class="px-6 py-4 text-sm text-gray-900 font-medium">
                                    {account.Name}
                                </td>
                                <td class="px-6 py-4 text-sm text-gray-600">{account.Phone}</td>
                                <td class="px-6 py-4 text-sm text-gray-600">{account.Industry}</td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>

        <!-- Empty State -->
        <template if:false="{hasAccounts}">
            <template if:false="{isLoading}">
                <div class="text-center py-8">
                    <p class="text-gray-500">No accounts found</p>
                </div>
            </template>
        </template>
    </div>
</template>
