name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Verify Code Formatting (Prettier)
        run: npm run prettier -- --check "**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}"

      - name: Run Linting (ESLint)
        run: npm run lint

      - name: Run LWC Unit Tests
        run: npm run test:unit:lwc
        continue-on-error: true
