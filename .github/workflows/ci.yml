name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run prettier:check

  salesforce:
    name: Salesforce validation
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ vars.SF_RUN_VALIDATION == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Create JWT key file
        run: printf '%s' "$SF_JWT_KEY" > server.key
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}

      - name: Authenticate Dev Hub
        run: sf org login jwt --client-id "$SF_CLIENT_ID" --jwt-key-file server.key --username "$SF_USERNAME" --set-default-dev-hub
        env:
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}

      - name: Create scratch org, deploy, and test
        run: SCRATCH_ORG_ALIAS=ci-org SCRATCH_ORG_DURATION=1 SKIP_ORG_OPEN=true npm run env:setup

      - name: Delete scratch org
        if: always()
        run: sf org delete scratch --target-org ci-org --no-prompt
