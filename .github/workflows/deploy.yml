name: Deploy to Scratch Org

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Create Scratch Org
        run: |
          sf org create scratch \
            -f config/project-scratch-def.json \
            -a test-org \
            -d \
            -y 1 \
            --no-namespace
        env:
          SALESFORCE_CLI_URL: https://login.salesforce.com

      - name: Deploy source code
        run: sf project deploy start --target-org test-org

      - name: Run tests
        run: sf apex run test --target-org test-org
        continue-on-error: true

      - name: Display test results
        run: sf apex get test --target-org test-org --json
        if: always()
        continue-on-error: true

      - name: Delete Scratch Org
        if: always()
        run: sf org delete scratch --target-org test-org --no-prompt
